name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── TypeScript: type-check, lint, test ────────────────────────────────────
  typescript:
    name: TypeScript (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: ["22"]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.22.0"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/akidb-native/target
          key: rust-${{ runner.os }}-${{ hashFiles('packages/akidb-native/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (TypeScript + native NAPI)
        run: pnpm build

      - name: Type-check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Open-core boundary check
        run: pnpm check:boundary

      - name: Test (vitest)
        run: pnpm test
        env:
          # Live e2e tests are skipped when this is absent — safe to omit in CI
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Rust: unit tests ──────────────────────────────────────────────────────
  rust:
    name: Rust (stable)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/akidb-native/target
          key: rust-unit-${{ runner.os }}-${{ hashFiles('packages/akidb-native/Cargo.lock') }}
          restore-keys: rust-unit-${{ runner.os }}-

      - name: cargo test
        run: cargo test
        working-directory: packages/akidb-native

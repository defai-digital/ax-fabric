[package]
name = "akidb-native"
version = "1.5.1"
edition = "2024"
license = "AGPL-3.0-or-later"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["node-api"]
node-api = ["dep:napi", "dep:napi-derive"]

[dependencies]
napi = { version = "2", features = ["napi8", "async"], optional = true }
napi-derive = { version = "2", optional = true }
rusqlite = { version = "0.31", features = ["bundled", "column_decltype"] }
memmap2 = "0.9"
sha2 = "0.10"
crc32fast = "1"
roaring = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tempfile = "3"
uuid = { version = "1", features = ["v4"] }

[build-dependencies]
napi-build = "2"

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "distance_bench"
harness = false

[[bench]]
name = "engine_bench"
harness = false

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "unwind"

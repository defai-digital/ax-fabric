[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "akidb"
version = "1.6.0"
description = "AkiDB — embedded vector database for Python (Rust-powered)"
readme = "README.md"
license = { text = "AGPL-3.0-or-later" }
requires-python = ">=3.9"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Rust",
    "Topic :: Database",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Homepage = "https://github.com/automatosx/ax-fabric"
Repository = "https://github.com/automatosx/ax-fabric"
Licensing = "https://github.com/automatosx/ax-fabric/blob/main/LICENSING.md"

[tool.maturin]
features = ["pyo3/extension-module"]
python-source = "python"
module-name = "akidb._native"

[tool.pytest.ini_options]
pythonpath = ["python"]
testpaths = ["tests"]
